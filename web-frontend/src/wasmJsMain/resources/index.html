<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrabShell</title>
    <link rel="icon" type="image/png" href="crabshell-icon.png">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1a1210;
        }
        #ComposeTarget {
            width: 100%;
            height: 100%;
        }
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            color: #ede0da;
            font-family: sans-serif;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
<div id="ComposeTarget">
    <div class="loading">Loading CrabShell...</div>
</div>
<!-- パスワードマネージャ連携用の隠しフォーム -->
<form id="login-form" autocomplete="on" style="position: fixed; top: 0; left: 0; z-index: -1; pointer-events: none;">
    <input id="login-email" type="email" name="email" autocomplete="username" tabindex="-1" />
    <input id="login-password" type="password" name="password" autocomplete="current-password" tabindex="-1" />
</form>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="web-frontend.js"></script>
</body>
</html>
