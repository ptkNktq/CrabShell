services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "2722:8080"
    environment:
      - FIREBASE_SERVICE_ACCOUNT_PATH=/app/firebase-service-account.json
    volumes:
      - .:/app
      - gradle-cache:/home/gradle/.gradle
      - ./firebase-service-account.json:/app/firebase-service-account.json:ro

volumes:
  gradle-cache:
