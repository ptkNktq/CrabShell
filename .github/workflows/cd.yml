name: CD

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker image
        run: |
          docker build --build-arg COMMIT_HASH=${GITHUB_SHA::7} \
            -t ghcr.io/ptknktq/crabshell:latest \
            -t ghcr.io/ptknktq/crabshell:${{ github.ref_name }} .
          docker push ghcr.io/ptknktq/crabshell:latest
          docker push ghcr.io/ptknktq/crabshell:${{ github.ref_name }}
      - name: Notify Discord
        if: always()
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PREFIX: ${{ secrets.DISCORD_WEBHOOK_PREFIX }}
          STATUS: ${{ job.status }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL is not set; skipping notification."
            exit 0
          fi
          if [ "$STATUS" = "success" ]; then
            title="CD 成功"
            color=3066993
          else
            title="CD 失敗"
            color=15158332
          fi
          if [ -n "$PREFIX" ]; then
            title="$PREFIX $title"
          fi
          short_sha="${SHA:0:7}"
          payload=$(jq -n \
            --arg title "$title" \
            --argjson color "$color" \
            --arg ref "$REF_NAME" \
            --arg sha "$short_sha" \
            --arg commit_url "$SERVER_URL/$REPO/commit/$SHA" \
            --arg run_url "$SERVER_URL/$REPO/actions/runs/$RUN_ID" \
            '{
              embeds: [{
                title: $title,
                color: $color,
                fields: [
                  {name: "タグ", value: $ref, inline: true},
                  {name: "コミット", value: ("[`" + $sha + "`](" + $commit_url + ")"), inline: true},
                  {name: "ワークフロー", value: ("[実行ログを開く](" + $run_url + ")"), inline: false}
                ],
                timestamp: (now | todate)
              }]
            }')
          curl -sS -H "Content-Type: application/json" -d "$payload" "$WEBHOOK_URL" \
            || echo "::warning::Discord notification failed"
