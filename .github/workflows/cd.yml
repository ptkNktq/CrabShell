name: CD

on:
  push:
    tags: ["v*"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - name: ktlint check
        run: chmod +x gradlew && ./gradlew ktlintCheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - name: Shared model tests
        run: chmod +x gradlew && ./gradlew :shared:jvmTest
      - name: Server unit tests
        run: ./gradlew :server:test -PskipFrontend

  deploy:
    runs-on: ubuntu-latest
    needs: [lint, test]
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: COMMIT_HASH=${{ github.sha }}
          tags: |
            ghcr.io/ptknktq/crabshell:latest
            ghcr.io/ptknktq/crabshell:${{ github.ref_name }}
