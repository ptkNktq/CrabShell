services:
  app:
    build:
      context: .
      args:
        COMMIT_HASH: ${COMMIT_HASH:-unknown}
    restart: unless-stopped
    ports:
      - "2722:8080"
    deploy:
      resources:
        limits:
          memory: 512m
    env_file: .env
    volumes:
      - ./firebase-service-account.json:/app/firebase-service-account.json:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
